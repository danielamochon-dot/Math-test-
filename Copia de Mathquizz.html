<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Math Test</title>
    <style>
        /* This CSS removes the default border/frame from the fieldset */
        fieldset {
            border: none;
            padding: 0;
            margin-bottom: 20px;
        }
        
        /* This makes the legend look like a standard bold heading */
        legend {
            font-weight: bold;
            font-size: 1.2em;
            padding: 0;
        }
    </style>
</head>
<body>

    <h1>Quick Math Quiz</h1>

    <form>
        
        <p>
            <label for="username">**Student Name:**</label><br>
            <input type="text" id="username" name="username" placeholder="Enter your full name">
        </p>

        <hr>

        <fieldset>
            <legend>Multiple Choice</legend>

            <p>1. What is the value of 5 &times; 5?</p>
            <input type="radio" id="q1a" name="q1" value="20">
            <label for="q1a">20</label><br>
            <input type="radio" id="q1b" name="q1" value="25">
            <label for="q1b">25</label><br>
            <input type="radio" id="q1c" name="q1" value="30">
            <label for="q1c">30</label>

            <p>2. Solve: 100 &divide; 4</p>
            <input type="radio" id="q2a" name="q2" value="25">
            <label for="q2a">25</label><br>
            <input type="radio" id="q2b" name="q2" value="50">
            <label for="q2b">50</label><br>
            <input type="radio" id="q2c" name="q2" value="75">
            <label for="q2c">75</label>

            <p>3. Which is true if x &plusmn; 5 = 10?</p>
            <input type="radio" id="q3a" name="q3" value="5">
            <label for="q3a">x could be 5 or 15</label><br>
            <input type="radio" id="q3b" name="q3" value="10">
            <label for="q3b">x is always 10</label><br>
            <input type="radio" id="q3c" name="q3" value="0">
            <label for="q3c">x is 0</label>
        </fieldset>

        <fieldset>
            <legend>Word Problem</legend>
            <p>
                If Sarah has 12 apples and gives &frac12; of them to her friend, 
                how many does she have left? Explain your reasoning below:
            </p>
            <textarea name="word_problem" rows="5" cols="40" placeholder="Type your answer here..."></textarea>
        </fieldset>

        <p>
            <button type="submit">Submit Test</button>
        </p>

    </form>
    </body>
</html>
